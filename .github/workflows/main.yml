name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:20
    
    # This tells npm to run all commands from inside this subdirectory
    defaults:
      run:
        working-directory: wtecc-CICD_PracticeCode
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install dependencies
        run: npm install
        
      - name: Run build
        run: npm run build