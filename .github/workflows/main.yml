name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install dependencies
        # Target the nested directory directly
        working-directory: ./wtecc-CICD_PracticeCode
        run: npm install
        
      - name: Run build
        working-directory: ./wtecc-CICD_PracticeCode
        run: npm run build