name: CI Pipeline

# Events that trigger the workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Adding the Job Runner
    runs-on: ubuntu-latest
    
    # Adding a container to the job runner
    container: node:20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install dependencies
        run: npm install
        
      - name: Run build
        run: npm run build
