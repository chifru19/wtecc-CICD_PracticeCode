name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      # By running ls here, we verify the exact path needed
      - name: List files
        run: ls -R
        
      # Use working-directory only on the steps that need it
      - name: Install dependencies
        working-directory: wtecc-CICD_PracticeCode
        run: npm install
        
      - name: Run build
        working-directory: wtecc-CICD_PracticeCode
        run: npm run build