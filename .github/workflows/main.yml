name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Find and Run Build
        run: |
          # Recursively find the directory that contains package.json
          PROJECT_DIR=$(find . -name "package.json" -exec dirname {} \; | head -n 1)
          
          if [ -z "$PROJECT_DIR" ]; then
            echo "Error: package.json not found!"
            exit 1
          fi
          
          echo "Found project at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          npm install
          npm run build