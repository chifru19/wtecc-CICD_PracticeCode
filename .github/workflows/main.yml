name: CI workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug and Install
        run: |
          node -v
          npm --version
          npm install --verbose
          
      - name: Build
        run: npm run build
