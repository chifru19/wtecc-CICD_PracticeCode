name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Debug - List directory structure
        run: ls -R
        
      - name: Install dependencies
        run: npm install
        
      - name: Run build
        run: npm run build