name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Find and Run Build
        run: |
          # Find the directory containing package.json
          TARGET_DIR=$(find . -name "package.json" -exec dirname {} \; | head -n 1)
          echo "Found project at: $TARGET_DIR"
          
          # Move to that directory and run the commands
          cd "$TARGET_DIR"
          npm install
          npm run build