apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  workspaces:
    - name: shared-data
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
      default: "master"
  tasks:
    - name: clone
      taskRef:
        name: checkout
      workspaces:
        - name: source
          workspace: shared-data
      params:
      - name: repo-url
        value: $(params.repo-url)
      - name: branch
        value: $(params.branch)

    - name: lint
      taskRef:
        name: echo
      params:
      - name: message
        value: "Calling ESLint linter..."
      runAfter:
        - clone

    - name: tests
      taskRef:
        name: echo
      params:
      - name: message
        value: "Running unit tests with Jest..."
      runAfter:
        - lint

    - name: build
      taskRef:
        name: echo
      params:
      - name: message
        value: "Building image for $(params.repo-url) ..."
      runAfter:
        - tests

    - name: deploy
      taskRef:
        name: echo
      params:
      - name: message
        value: "Deploying $(params.branch) branch of $(params.repo-url) ..."
      runAfter:
        - build